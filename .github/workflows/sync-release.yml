name: Sync Release to Community

on:
  push:
    branches: [master]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create release on simpad-community
        env:
          GH_TOKEN: ${{ secrets.COMMUNITY_REPO_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          gh release create "build-${SHORT_SHA}" \
            --repo fp101fs/simpad-community \
            --title "${COMMIT_MSG}" \
            --notes "Deployed commit [\`${SHORT_SHA}\`](${COMMIT_URL})"
